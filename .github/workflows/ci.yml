name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: ['18', '20', '22']
        os: [ubuntu-latest]
        include:
          - node-version: '18'
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check all JS files
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('hooks.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"

      - name: Status check
        run: npm test

  package:
    name: Validate Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Pack and validate tarball
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          # Ensure tests and dev-only files are excluded
          if grep -q "tests/" pack-output.txt; then
            echo "::error::tests/ directory leaked into package"
            exit 1
          fi
          if grep -q "logo.png" pack-output.txt; then
            echo "::error::logo.png leaked into package"
            exit 1
          fi
          if grep -q "AGENTS.md" pack-output.txt; then
            echo "::error::AGENTS.md leaked into package"
            exit 1
          fi
          echo "✓ Package contents validated"

      - name: Version consistency
        run: |
          PKG_VER=$(node -e "console.log(require('./package.json').version)")
          PLUGIN_VER=$(node -e "console.log(require('./plugin.json').version)")
          if [ "$PKG_VER" != "$PLUGIN_VER" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VER plugin.json=$PLUGIN_VER"
            exit 1
          fi
          echo "✓ Versions consistent: $PKG_VER"
